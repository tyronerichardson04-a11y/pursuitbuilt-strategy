// ─── HELPERS ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function trackColor(t) {
  return t==='Glasses'?C.purple:t==='Planner'?C.yellow:t==='Brand'?C.red:C.green;
}
function statusColor(s) {
  return s==='ready'?C.green:s==='film'?C.yellow:s==='event'?C.purple:C.muted;
}
function statusLabel(s) {
  return s==='ready'?'Ready Now':s==='film'?'Film This':s==='event'?'Event-Triggered':'Plan Ahead';
}
function platColor(p) {
  return p&&p.indexOf('YouTube')!==-1&&p.indexOf('IG')!==-1?'#a855f7':p&&p.indexOf('YouTube')!==-1?'#ff4444':'#e1306c';
}
function pillarColor(p) { return PC[p]||C.red; }

function tag(text, color) {
  var bg = color ? color+'22' : C.redGlow;
  var border = color ? color+'55' : C.red+'44';
  var col = color || C.accent;
  return '<span style="background:'+bg+';border:1px solid '+border+';color:'+col+';padding:2px 8px;border-radius:3px;font-size:11px;font-family:\'DM Mono\',monospace;letter-spacing:0.04em;white-space:nowrap;">'+esc(text)+'</span>';
}

function sectionLabel(text, color) {
  return '<div style="font-size:11px;font-family:\'DM Mono\',monospace;color:'+(color||C.muted)+';letter-spacing:0.1em;margin-bottom:8px;text-transform:uppercase;">'+esc(text)+'</div>';
}

// ─── RENDER: HEADER ───────────────────────────────────────────────────────────
function renderHeader() {

    +'<div style="position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,'+C.redGlow+' 0%,transparent 60%);pointer-events:none;"></div>'
    +'<div style="position:relative;">'
    +'<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:'+C.red+';letter-spacing:0.2em;margin-bottom:6px;text-transform:uppercase;">Social Strategy — v3</div>'
    +'<h1 style="margin:0;font-size:clamp(26px,5vw,38px);font-weight:800;letter-spacing:-0.03em;line-height:1.1;">PURSUIT<span style="color:'+C.red+';">BUILT</span></h1>'
    +'<p style="margin:6px 0 10px;color:'+C.muted+';font-size:13px;font-style:italic;">“Normal guys can build something that can’t be bought.”</p>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;">'
    +tag('Instagram','#e1306c')
    +tag('YouTube','#ff4444')
    +tag('AI Glasses Track',C.purple)
    +tag('Planner Track',C.yellow)
    +'</div></div></div>';
}

// ─── RENDER: TABS ─────────────────────────────────────────────────────────────
function renderTabs() {
  var tabs = [
    {id:'calendar',label:'6-Month Calendar'},
    {id:'sequence',label:'Launch Sequence'},
    {id:'pipeline',label:'Production Pipeline'},
    {id:'pillars',label:'Content Pillars'},
    {id:'generator',label:'Content Generator'}
  ];
  var html = '<div style="display:flex;border-bottom:1px solid '+C.border+';padding:0 16px;overflow-x:auto;">';
  tabs.forEach(function(t) {
    var active = activeTab === t.id;
    html += '<button onclick="switchTab(\''+t.id+'\')" style="'
      +'background:none;border:none;'
      +'border-bottom:'+(active?'2px solid '+C.red:'2px solid transparent')+';'
      +'color:'+(active?C.text:C.muted)+';'
      +'padding:14px 16px 12px;font-size:13px;'
      +'font-weight:'+(active?700:400)+';'
      +'cursor:pointer;font-family:\'DM Sans\',sans-serif;'
      +'white-space:nowrap;transition:color 0.2s;'
      +'">'+esc(t.label)+'</button>';
  });
  html += '</div>';
  return html;
}

    var phases = [
      'Phase 1 — Assessment & Mechanical Baseline',
      'Phase 2 — De-Cop & Interior Strip',
      'Phase 3 — Engine Bay',
      'Phase 4 — Suspension & Brakes',
      'Phase 5 — Exterior & Wrap',
      'Phase 6 — Interior Build-Out',
      'Phase 7 — Smart Glasses & AI System'
    ];
    var savedPhase = fv['gen-phase'] || phases[0];
    html += '<div style="'+fieldWrap+'">'
      +'<label style="'+labelStyle+'">Phase</label>'
      +'<select id="gen-phase" onchange="GEN.values[\'gen-phase\']=this.value" '
      +'onfocus="this.style.borderColor=\'#C41E3A\'" onblur="this.style.borderColor=\'#2a2a2a\'" '
      +'style="'+inputStyle+'cursor:pointer;appearance:none;-webkit-appearance:none;">';
    phases.forEach(function(p) {
      html += '<option value="'+esc(p)+'"'+(p===savedPhase?' selected':'')+'>'+esc(p)+'</option>';
    });
    html += '</select></div>';

    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;'+fieldWrap+'">'
      +'<div><label style="'+labelStyle+'">Planned Cost</label>'
      +'<input id="gen-planned-cost" type="text" placeholder="e.g. $340" '
      +'value="'+esc(fv['gen-planned-cost']||'')+'" '
      +'oninput="GEN.values[\'gen-planned-cost\']=this.value" '
      +'onfocus="this.style.borderColor=\'#C41E3A\'" onblur="this.style.borderColor=\'#2a2a2a\'" '
      +'style="'+inputStyle+'"></div>'
      +'<div><label style="'+labelStyle+'">Actual Cost</label>'
      +'<input id="gen-actual-cost" type="text" placeholder="e.g. $487" '
      +'value="'+esc(fv['gen-actual-cost']||'')+'" '
      +'oninput="GEN.values[\'gen-actual-cost\']=this.value" '
      +'onfocus="this.style.borderColor=\'#C41E3A\'" onblur="this.style.borderColor=\'#2a2a2a\'" '
      +'style="'+inputStyle+'"></div>'
      +'</div>';

    html += '<div style="'+fieldWrap+'">'
      +'<label style="'+labelStyle+'">Parts Used <span style="color:#555;font-size:10px;letter-spacing:0;text-transform:none;">(optional)</span></label>'
      +'<textarea id="gen-parts-used" rows="3" placeholder="Key parts — names, brands, sources" '
      +'oninput="GEN.values[\'gen-parts-used\']=this.value" '
      +'onfocus="this.style.borderColor=\'#C41E3A\'" onblur="this.style.borderColor=\'#2a2a2a\'" '
      +'style="'+inputStyle+'resize:vertical;">'+esc(fv['gen-parts-used']||'')+'</textarea></div>';

    html += '<div style="'+fieldWrap+'">'
      +'<label style="'+labelStyle+'">Surprises / Failures <span style="color:#555;font-size:10px;letter-spacing:0;text-transform:none;">(optional — gold content)</span></label>'
      +'<textarea id="gen-what-went-wrong" rows="3" placeholder="What failed, cost more, or surprised you" '
      +'oninput="GEN.values[\'gen-what-went-wrong\']=this.value" '
      +'onfocus="this.style.borderColor=\'#C41E3A\'" onblur="this.style.borderColor=\'#2a2a2a\'" '
      +'style="'+inputStyle+'resize:vertical;">'+esc(fv['gen-what-went-wrong']||'')+'</textarea></div>';

    var sonsVal = fv['gen-sons'] || 'no';
    html += '<div style="'+fieldWrap+'">'
      +'<label style="'+labelStyle+'">Sons Involved</label>'
      +'<div style="display:flex;gap:8px;">'
      +'<button onclick="toggleSons(\'yes\')" style="'
      +'background:'+(sonsVal==='yes'?'#4caf5022':'none')+';'
      +'border:1px solid '+(sonsVal==='yes'?'#4caf5066':'#2a2a2a')+';'
      +'color:'+(sonsVal==='yes'?'#4caf50':'#888')+';'
      +'padding:8px 24px;border-radius:4px;cursor:pointer;font-size:13px;'
      +'font-family:\'DM Mono\',monospace;letter-spacing:0.04em;">Yes</button>'
      +'<button onclick="toggleSons(\'no\')" style="'
      +'background:'+(sonsVal==='no'?'rgba(196,30,58,0.08)':'none')+';'
      +'border:1px solid '+(sonsVal==='no'?'#C41E3A44':'#2a2a2a')+';'
      +'color:'+(sonsVal==='no'?'#888':'#555')+';'
      +'padding:8px 24px;border-radius:4px;cursor:pointer;font-size:13px;'
      +'font-family:\'DM Mono\',monospace;letter-spacing:0.04em;">No</button>'
      +'</div></div>';

  // ── TECH & MAKER FIELDS ──
  } else {
    var savedMonth = fv['gen-build-month'] || 'Month 1';
    html += '<div style="'+fieldWrap+'">'
      +'<label style="'+labelStyle+'">Build Month</label>'
      +'<select id="gen-build-month" onchange="GEN.values[\'gen-build-month\']=this.value" '
      +'onfocus="this.style.borderColor=\'#C41E3A\'" onblur="this.style.borderColor=\'#2a2a2a\'" '
      +'style="'+inputStyle+'cursor:pointer;appearance:none;-webkit-appearance:none;">';
    [
      {val:'Month 1',label:'Month 1 — The Concept'},
      {val:'Month 2',label:'Month 2 — Component Sourcing'},
      {val:'Month 3',label:'Month 3 — SolidWorks Design'},
      {val:'Month 4',label:'Month 4 — First Print'},
      {val:'Month 5',label:'Month 5 — Assembly'},
      {val:'Month 6',label:'Month 6 — First Garage Test'}
    ].forEach(function(m) {
      html += '<option value="'+esc(m.val)+'"'+(m.val===savedMonth?' selected':'')+'>'+esc(m.label)+'</option>';
    });
    html += '</select></div>';

    html += '<div style="'+fieldWrap+'">'
      +'<label style="'+labelStyle+'">Components Discussed <span style="color:#555;font-size:10px;letter-spacing:0;text-transform:none;">(optional)</span></label>'
      +'<textarea id="gen-components" rows="3" placeholder="e.g. Pi Zero 2W, SolidWorks housing v2, PLA+ filament, camera module" '
      +'oninput="GEN.values[\'gen-components\']=this.value" '
      +'onfocus="this.style.borderColor=\'#C41E3A\'" onblur="this.style.borderColor=\'#2a2a2a\'" '
      +'style="'+inputStyle+'resize:vertical;">'+esc(fv['gen-components']||'')+'</textarea></div>';

    html += '<div style="'+fieldWrap+'">'
      +'<label style="'+labelStyle+'">What Failed <span style="color:#555;font-size:10px;letter-spacing:0;text-transform:none;">(optional — top-performing content)</span></label>'
      +'<textarea id="gen-what-failed" rows="3" placeholder="Failed prints, wrong components, design flaws mid-build" '
      +'oninput="GEN.values[\'gen-what-failed\']=this.value" '
      +'onfocus="this.style.borderColor=\'#C41E3A\'" onblur="this.style.borderColor=\'#2a2a2a\'" '
      +'style="'+inputStyle+'resize:vertical;">'+esc(fv['gen-what-failed']||'')+'</textarea></div>';

    html += '<div style="'+fieldWrap+'">'
      +'<label style="'+labelStyle+'">How Claude Helped <span style="color:#555;font-size:10px;letter-spacing:0;text-transform:none;">(optional)</span></label>'
      +'<textarea id="gen-claude-involvement" rows="3" placeholder="What did you use Claude for in this phase?" '
      +'oninput="GEN.values[\'gen-claude-involvement\']=this.value" '
      +'onfocus="this.style.borderColor=\'#C41E3A\'" onblur="this.style.borderColor=\'#2a2a2a\'" '
      +'style="'+inputStyle+'resize:vertical;">'+esc(fv['gen-claude-involvement']||'')+'</textarea></div>';

    html += '<div style="'+fieldWrap+'">'
      +'<label style="'+labelStyle+'">Where Claude Got It Wrong <span style="color:#555;font-size:10px;letter-spacing:0;text-transform:none;">(optional)</span></label>'
      +'<textarea id="gen-claude-wrong" rows="3" placeholder="Where AI assistance fell short or needed correction" '
      +'oninput="GEN.values[\'gen-claude-wrong\']=this.value" '
      +'onfocus="this.style.borderColor=\'#C41E3A\'" onblur="this.style.borderColor=\'#2a2a2a\'" '
      +'style="'+inputStyle+'resize:vertical;">'+esc(fv['gen-claude-wrong']||'')+'</textarea></div>';

    html += '<div style="'+fieldWrap+'">'
      +'<label style="'+labelStyle+'">How This Connects Back to the Car <span style="color:#C41E3A;font-size:10px;letter-spacing:0;text-transform:none;">(required)</span></label>'
      +'<textarea id="gen-car-connection" rows="3" placeholder="Specific moment in the build this enables — be precise" '
      +'oninput="GEN.values[\'gen-car-connection\']=this.value" '
      +'onfocus="this.style.borderColor=\'#C41E3A\'" onblur="this.style.borderColor=\'#2a2a2a\'" '
      +'style="'+inputStyle+'resize:vertical;">'+esc(fv['gen-car-connection']||'')+'</textarea></div>';
  }

  // Submit button
  html += '<button onclick="submitGenerator()" style="'
    +'background:#C41E3A;color:#fff;border:none;'
    +'width:100%;padding:14px;border-radius:6px;'
    +'font-size:13px;font-weight:700;font-family:\'DM Mono\',monospace;'
    +'letter-spacing:0.12em;cursor:pointer;margin-top:4px;'
    +'">GENERATE SCRIPT</button>';

  html += '</div>';
  return html;
}

// ─── STATE HANDLERS ───────────────────────────────────────────────────────────
function switchTab(id) {
  activeTab = id;
  expandedPost = null;
  render();
}
function toggleMonth(mi) {
  expandedMonth = expandedMonth === mi ? null : mi;
  render();
}
function togglePost(i) {
  expandedPost = expandedPost === i ? null : i;
  render();
}
function switchGeneratorTheme(t) {
  GEN.theme = t;
  GEN.state = GEN.state === 'success' ? 'idle' : GEN.state;
  render();
}
function toggleSons(val) {
  GEN.values['gen-sons'] = val;
  render();
}
function retryGenerator() {
  GEN.state = 'idle';
  GEN.result = null;
  GEN.error = '';
  render();
}
function submitGenerator() {
  var v = GEN.values;
  var topic = (v['gen-topic'] || '').trim();
  if (!topic) {
    GEN.state = 'error';
    GEN.error = 'Topic is required before generating.';
    render();
    return;
  }
  var payload = { theme: GEN.theme, topic: topic, email: v['gen-email'] || '' };
  if (GEN.theme === 'car') {
    payload.phase = v['gen-phase'] || 'Phase 1 — Assessment & Mechanical Baseline';
    payload.planned_cost = v['gen-planned-cost'] || '';
    payload.actual_cost = v['gen-actual-cost'] || '';
    payload.parts_used = v['gen-parts-used'] || '';
    payload.what_went_wrong = v['gen-what-went-wrong'] || '';
    payload.sons_involved = v['gen-sons'] || 'no';
  } else {
    payload.build_month = v['gen-build-month'] || 'Month 1';
    payload.components_discussed = v['gen-components'] || '';
    payload.what_failed = v['gen-what-failed'] || '';
    payload.claude_involvement = v['gen-claude-involvement'] || '';
    payload.claude_got_wrong = v['gen-claude-wrong'] || '';
    payload.car_connection = v['gen-car-connection'] || '';
  }
  GEN.state = 'loading';
  GEN.result = null;
  GEN.error = '';
  render();
  var controller = new AbortController();
  var timeout = setTimeout(function() { controller.abort(); }, 120000);
  fetch(WEBHOOK_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
    signal: controller.signal
  })
  .then(function(r) {
    clearTimeout(timeout);
    if (!r.ok) throw new Error('Server responded with ' + r.status);
    return r.json();
  })
  .then(function(data) {
    GEN.state = 'success';
    GEN.result = data;
    render();
  })
  .catch(function(err) {
    clearTimeout(timeout);
    GEN.state = 'error';
    GEN.error = err.name === 'AbortError'
      ? 'Request timed out after 2 minutes. The workflow may still be running — check n8n.'
      : (err.message || 'Something went wrong. Please try again.');
    render();
  });
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function render() {
  var content = '';
  if (activeTab === 'calendar') content = renderCalendar();
  else if (activeTab === 'sequence') content = renderSequence();
  else if (activeTab === 'pipeline') content = renderPipeline();
  else if (activeTab === 'pillars') content = renderPillars();
  else if (activeTab === 'generator') content = renderGenerator();

  document.getElementById('app').innerHTML =
    renderHeader()
    + renderTabs()
    + '<div style="padding:20px 14px;max-width:720px;margin:0 auto;">' + content + '</div>';
}

render();
</script>
